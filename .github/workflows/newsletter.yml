name: Blog to Newsletter

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch: {}       # bouton pour lancer manuellement depuis l'onglet Actions

permissions:
  contents: write   # nécessaire pour que le job puisse sauvegarder state.json

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      SITE_DB: ${{ secrets.SITE_DB }}
      SITE_USER: ${{ secrets.SITE_USER }}
      SITE_API_KEY: ${{ secrets.SITE_API_KEY }}
      MAIL_URL: ${{ secrets.MAIL_URL }}
      MAIL_DB: ${{ secrets.MAIL_DB }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_API_KEY: ${{ secrets.MAIL_API_KEY }}
      MAILING_LIST_ID: ${{ secrets.MAILING_LIST_ID }}
      AUTO_SEND: "false"   # passe à "true" plus tard quand tu es confiant

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer le script
        run: python blog_to_newsletter.py

      - name: Sauvegarder l'état (state.json) dans le dépôt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Mise à jour state.json [skip ci]"
          git push
